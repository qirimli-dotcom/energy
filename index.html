<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pecron — автономное питание | IT-Trade Крым</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --ink:#0a0b0d; --ink-soft:#14161a; --card-dark:#17191e; --line-dark:#25272e;
    --paper:#f4f1ea; --paper-card:#ffffff; --line-light:#e4ded0;
    --text-dark:#f2f0ea; --text-dark-soft:#9a9ca3;
    --text-light:#1a1a17; --text-light-soft:#6b6a5f;
    --amber:#ff8a3d; --amber-hot:#ffb054; --amber-deep:#e06a1f;
    --mono:'JetBrains Mono',monospace; --display:'Space Grotesk',sans-serif; --body:'Inter',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{width:100%; overflow-x:hidden;}
  body{font-family:var(--body); background:var(--paper); color:var(--text-light); width:100%; position:relative;}
  a{color:inherit;}
  .wrap{max-width:1200px; margin:0 auto; padding:0 28px;}
  @media(max-width:560px){ .wrap{padding:0 16px;} }

  /* HEADER */
  header{background:var(--ink); width:100%; padding:18px 32px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:40; border-bottom:1px solid var(--line-dark); box-sizing:border-box;}
  .brand{display:flex; align-items:center; gap:10px;}
  .logo-chip{background:#fff; border-radius:8px; padding:6px 10px; display:flex; align-items:center;}
  .logo-chip img{height:22px; width:auto; display:block;}
  .ittrade-logo{height:32px; width:auto; display:block;}
  .brand .name{font-family:var(--display); font-weight:700; font-size:17px; color:#fff; letter-spacing:-.01em;}
  .brand .tag{font-family:var(--mono); font-size:10px; color:var(--text-dark-soft); letter-spacing:.04em; text-transform:uppercase; margin-top:1px;}
  nav.mainnav{display:flex; gap:30px;}
  nav.mainnav a{color:#d6d7db; text-decoration:none; font-size:14px; font-weight:500;}
  nav.mainnav a:hover{color:var(--amber-hot);}
  .header-actions{display:flex; align-items:center; gap:12px;}
  .cart-btn{background:var(--ink-soft); border:1px solid var(--line-dark); color:#fff; border-radius:10px; padding:10px 16px; font-family:var(--mono); font-size:13px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:8px;}
  .cart-btn:hover{border-color:var(--amber);}
  .cart-count{background:var(--amber); color:var(--ink); border-radius:5px; padding:1px 6px; font-size:11px; font-weight:700;}
  @media(max-width:880px){ nav.mainnav{display:none;} }
  @media(max-width:560px){
    header{padding:12px 16px;}
    .brand{gap:8px;}
    .logo-chip{padding:5px 8px;}
    .logo-chip img{height:18px;}
    .ittrade-logo{height:24px;}
    .cart-btn{padding:9px 12px; font-size:12px; gap:6px;}
    .cart-btn .cart-label{display:none;}
  }

  /* HERO */
  .hero{position:relative; background:var(--ink); color:#fff; padding:100px 20px 0; overflow:hidden;}
  .hero-grid-bg{position:absolute; inset:0; background-image:linear-gradient(rgba(255,138,61,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,138,61,.06) 1px,transparent 1px); background-size:52px 52px; mask-image:radial-gradient(ellipse 70% 60% at 50% 30%, black, transparent);}
  .hero-glow{position:absolute; top:-200px; left:50%; transform:translateX(-50%); width:900px; height:900px; background:radial-gradient(circle, rgba(255,138,61,.18), transparent 60%); pointer-events:none;}
  .hero-inner{position:relative; max-width:780px; margin:0 auto; text-align:center;}
  .hero-eyebrow{display:inline-flex; align-items:center; gap:9px; font-family:var(--mono); font-size:12px; color:var(--amber-hot); border:1px solid var(--line-dark); background:var(--ink-soft); padding:8px 16px; border-radius:20px; margin-bottom:32px;}
  .hero-eyebrow .dot{width:6px; height:6px; border-radius:50%; background:var(--amber); box-shadow:0 0 8px var(--amber);}
  .hero-title{font-family:var(--display); font-size:56px; line-height:1.05; font-weight:700; letter-spacing:-.02em;}
  .hero-title .accent{color:var(--amber);}
  .hero-sub{font-size:17px; color:#a6a8af; line-height:1.6; max-width:540px; margin:26px auto 40px;}
  .hero-actions{display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-bottom:64px;}
  .btn-solid{display:inline-flex; align-items:center; gap:8px; background:var(--amber); color:var(--ink); text-decoration:none; padding:15px 28px; border-radius:10px; font-weight:700; font-size:14px; border:none; cursor:pointer; font-family:var(--body);}
  .btn-solid:hover{background:var(--amber-hot);}
  .btn-ghost{display:inline-block; background:transparent; color:#fff; text-decoration:none; padding:15px 28px; border-radius:10px; font-weight:600; font-size:14px; border:1px solid var(--line-dark);}
  .btn-ghost:hover{border-color:#fff;}

  /* SPEC TICKER */
  .ticker{position:relative; border-top:1px solid var(--line-dark); background:var(--ink-soft); display:grid; grid-template-columns:repeat(2,1fr); }
  @media(min-width:760px){ .ticker{grid-template-columns:repeat(4,1fr);} }
  .ticker-item{padding:26px 20px; text-align:center; border-right:1px solid var(--line-dark); border-bottom:1px solid var(--line-dark);}
  @media(min-width:760px){ .ticker-item:last-child{border-right:none;} .ticker-item{border-bottom:none;} }
  .ticker-num{font-family:var(--mono); font-size:26px; font-weight:700; color:var(--amber-hot);}
  .ticker-label{font-size:11.5px; color:var(--text-dark-soft); margin-top:4px; text-transform:uppercase; letter-spacing:.03em;}

  /* SECTION SHARED */
  section{padding:80px 0;}
  @media(max-width:640px){ section{padding:28px 0;} }
  .sec-head{max-width:600px; margin:0 auto 44px;}
  .sec-head.center{text-align:center;}
  .sec-kicker{font-family:var(--mono); font-size:12px; color:var(--amber-deep); text-transform:uppercase; letter-spacing:.06em; margin-bottom:12px;}
  .sec-title{font-family:var(--display); font-size:32px; font-weight:700; letter-spacing:-.01em; margin-bottom:12px;}
  .sec-sub{font-size:15px; color:var(--text-light-soft); line-height:1.6;}

  /* WHY (paper) */
  .why-grid{display:grid; grid-template-columns:1fr; gap:1px; background:var(--line-light); border:1px solid var(--line-light); border-radius:16px; overflow:hidden;}
  @media(min-width:680px){ .why-grid{grid-template-columns:repeat(3,1fr);} }
  .why-card{background:var(--paper-card); padding:32px 28px;}
  .why-card .num{font-family:var(--mono); font-size:12px; color:var(--amber-deep); margin-bottom:14px;}
  .why-card h3{font-family:var(--display); font-size:17px; font-weight:600; margin-bottom:10px;}
  .why-card p{font-size:13.5px; color:var(--text-light-soft); line-height:1.6;}

  /* ENGINEERING (dark) */
  .eng-sec{background:var(--ink); color:#fff;}
  .eng{display:grid; grid-template-columns:1fr; gap:44px; align-items:start;}
  @media(min-width:880px){ .eng{grid-template-columns:.9fr 1.1fr;} }
  .eng .sec-title{color:#fff;}
  .eng-desc{font-size:14.5px; color:var(--text-dark-soft); line-height:1.65; margin-bottom:8px;}
  .eng-list{display:grid; gap:1px; background:var(--line-dark); border:1px solid var(--line-dark); border-radius:14px; overflow:hidden;}
  .eng-row{background:var(--ink-soft); padding:20px 22px; display:flex; justify-content:space-between; align-items:center; gap:16px;}
  .eng-row h3{font-size:14.5px; font-weight:600; margin-bottom:4px;}
  .eng-row p{font-size:12.5px; color:var(--text-dark-soft); line-height:1.5;}
  .eng-row .val{font-family:var(--mono); color:var(--amber-hot); font-size:15px; font-weight:600; white-space:nowrap;}

  /* CATALOG */
  .cat-tabs{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  .cat-tab{padding:11px 20px; border-radius:10px; border:1px solid var(--line-light); background:var(--paper-card); font-size:13.5px; font-weight:600; cursor:pointer; color:var(--text-light);}
  .cat-tab.active{background:var(--ink); border-color:var(--ink); color:#fff;}
  .catalog-toolbar{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px; margin-bottom:36px;}
  .cap-filters{display:flex; gap:8px; flex-wrap:wrap;}
  .cap-chip{padding:7px 14px; border-radius:8px; border:1px solid var(--line-light); background:transparent; font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:.02em; cursor:pointer; color:var(--text-light-soft); font-family:var(--mono);}
  .cap-chip.active{background:var(--amber); border-color:var(--amber); color:var(--ink);}
  .search{width:240px; padding:10px 14px; border:1px solid var(--line-light); border-radius:8px; font-size:13.5px; font-family:var(--body); background:var(--paper-card);}
  .search:focus{outline:none; border-color:var(--amber);}
  @media(max-width:640px){
    .catalog-toolbar{flex-direction:column; align-items:stretch; margin-bottom:20px;}
    .cat-tabs{flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; padding:0 16px 4px; margin:0 -16px 14px; scrollbar-width:none;}
    .cat-tabs::-webkit-scrollbar{display:none;}
    .cat-tab{flex-shrink:0;}
    .search{width:100%;}
  }

  .grid{display:grid; grid-template-columns:1fr; gap:20px;}
  @media(min-width:640px){ .grid{grid-template-columns:1fr 1fr;} }
  @media(min-width:980px){ .grid{grid-template-columns:repeat(3,1fr);} }

  .card{background:var(--paper-card); border:1px solid var(--line-light); border-radius:14px; overflow:hidden; display:flex; flex-direction:column; transition:border-color .15s, transform .15s;}
  .card:hover{border-color:var(--amber); transform:translateY(-2px);}
  .thumb{position:relative; width:100%; height:190px; background:#faf8f3; display:flex; align-items:center; justify-content:center; overflow:hidden; border-bottom:1px solid var(--line-light);}
  .thumb img{width:82%; height:82%; object-fit:contain;}
  .thumb .no-photo{font-size:11px; color:#c4c0b2; font-family:var(--mono);}
  .badge{position:absolute; top:12px; left:12px; background:var(--amber); color:var(--ink); font-size:10px; font-weight:700; text-transform:uppercase; padding:4px 10px; border-radius:6px; z-index:2; font-family:var(--mono);}
  .card-body{padding:20px 20px 22px; display:flex; flex-direction:column; flex:1;}
  .card h3{font-family:var(--display); font-size:16px; font-weight:600; margin-bottom:3px;}
  .card .sku{font-family:var(--mono); font-size:10px; color:#b8b4a6; margin-bottom:14px;}
  .specs{display:grid; grid-template-columns:1fr 1fr; gap:10px 14px; padding:14px 0; margin-bottom:14px; border-top:1px dashed var(--line-light); border-bottom:1px dashed var(--line-light);}
  .spec-label{font-size:10px; color:var(--text-light-soft); text-transform:uppercase; letter-spacing:.03em;}
  .spec-value{font-family:var(--mono); font-size:13px; font-weight:600; color:var(--text-light); margin-top:2px;}
  .card .desc{font-size:12px; color:var(--text-light-soft); line-height:1.5; margin-bottom:16px; flex:1;}
  .price-row{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px;}
  .price{font-family:var(--display); font-size:20px; font-weight:700;}
  .price .cur{font-size:13px; color:var(--text-light-soft); font-weight:500;}
  .add-btn{width:100%; background:var(--ink); color:#fff; border:none; border-radius:9px; padding:13px; font-size:13.5px; font-weight:600; cursor:pointer; font-family:var(--body);}
  .add-btn:hover{background:var(--amber-deep);}
  .qty{display:flex; align-items:center; justify-content:space-between; border:1px solid var(--ink); border-radius:9px; overflow:hidden;}
  .qty button{width:38px; height:40px; border:none; background:transparent; color:var(--text-light); font-size:16px; cursor:pointer;}
  .qty button:hover{background:var(--paper);}
  .qty span{font-family:var(--mono); font-size:13.5px; font-weight:600;}
  @media(max-width:640px){
    .grid{gap:14px;}
    .thumb{height:170px;}
    .card-body{padding:16px 16px 18px;}
    .specs{grid-template-columns:1fr;}
    .qty button{height:44px;}
    .price{font-size:18px;}
  }

  /* SUPPORT (dark) */
  .support{background:var(--ink); color:#fff;}
  .support .sec-title{color:#fff;}
  .support .sec-sub{color:var(--text-dark-soft);}
  .trust-grid{display:grid; grid-template-columns:1fr; gap:1px; background:var(--line-dark); border:1px solid var(--line-dark); border-radius:14px; overflow:hidden;}
  @media(min-width:680px){ .trust-grid{grid-template-columns:repeat(2,1fr);} }
  @media(min-width:980px){ .trust-grid{grid-template-columns:repeat(4,1fr);} }
  .trust-card{background:var(--ink-soft); padding:26px 22px;}
  .trust-card h3{font-family:var(--display); font-size:14.5px; margin-bottom:8px;}
  .trust-card p{font-size:12.5px; color:var(--text-dark-soft); line-height:1.55;}

  /* FOOTER */
  .site-footer{background:var(--ink); border-top:1px solid var(--line-dark); padding:48px 24px 26px; color:#fff;}
  .footer-inner{max-width:1200px; margin:0 auto; display:flex; flex-wrap:wrap; justify-content:space-between; gap:32px;}
  .footer-brand .name{font-family:var(--display); font-size:19px; font-weight:700; margin-bottom:10px;}
  .footer-brand .name .amber{color:var(--amber);}
  .footer-brand p{font-size:12.5px; color:var(--text-dark-soft); max-width:300px; line-height:1.55;}
  .footer-cols{display:flex; gap:60px; flex-wrap:wrap;}
  .footer-col h4{font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:#6b6d76; margin-bottom:14px;}
  .footer-col a, .footer-col div{display:block; font-size:13px; color:var(--text-dark-soft); text-decoration:none; margin-bottom:10px; background:none; border:none; cursor:pointer; font-family:var(--body); padding:0; text-align:left;}
  .footer-col a:hover, .footer-col button:hover{color:#fff;}

  /* CART DRAWER */
  .cart-panel{position:fixed; top:0; right:-100%; width:100%; max-width:400px; height:100%; background:var(--paper-card); z-index:50; box-shadow:-4px 0 24px rgba(0,0,0,.25); transition:right .25s ease; display:flex; flex-direction:column;}
  .cart-panel.open{right:0;}
  .cart-head{padding:22px; border-bottom:1px solid var(--line-light); display:flex; justify-content:space-between; align-items:center;}
  .cart-head h2{font-family:var(--display); font-size:16px; font-weight:700;}
  .close-btn{background:none; border:none; font-size:22px; cursor:pointer; color:var(--text-light-soft);}
  .cart-items{flex:1; overflow-y:auto; padding:12px 22px;}
  .cart-item{display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-bottom:1px solid var(--line-light); gap:10px;}
  .cart-item .name{font-size:13.5px; font-weight:600;}
  .cart-item .sub{font-family:var(--mono); font-size:11.5px; color:var(--text-light-soft);}
  .cart-item .remove{color:#c0392b; background:none; border:none; font-size:12px; cursor:pointer; text-decoration:underline;}
  .cart-foot{padding:20px 22px; border-top:1px solid var(--line-light);}
  .total-row{display:flex; justify-content:space-between; font-family:var(--display); font-size:18px; font-weight:700; margin-bottom:16px;}
  .order-btn{width:100%; background:var(--amber); color:var(--ink); border:none; border-radius:10px; padding:15px; font-size:14px; font-weight:700; cursor:pointer; font-family:var(--body);}
  .order-btn:hover{background:var(--amber-hot);}
  .empty-cart{color:var(--text-light-soft); font-size:13.5px; text-align:center; padding:50px 0;}
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:40; display:none;}
  .overlay.open{display:block;}
</style>
</head>

let cart = {};
let currentCat = 'stations';

function fmt(n){ return n.toLocaleString('ru-RU'); }

function renderTabs(){
  document.getElementById('catTabs').innerHTML = CATEGORIES.map(c =>
    `<div class="cat-tab ${c.id===currentCat?'active':''}" onclick="switchCat('${c.id}')">${c.label}</div>`
  ).join('');
}

function switchCat(id){
  currentCat = id;
  document.getElementById('search').value = '';
  renderTabs();
  render();
  document.getElementById('catalog').scrollIntoView({behavior:'smooth'});
}

function currentList(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  let list = products.filter(p => p.cat === currentCat);
  if(q) list = list.filter(p => p.name.toLowerCase().includes(q));
  return list.sort((a, b) => a.price - b.price);
}

function keyFor(p){ return p.sku || p.name; }

function render(){
  const grid = document.getElementById('grid');
  const list = currentList();
  grid.innerHTML = list.map(p => {
    const key = keyFor(p);
    const q = cart[key]?.qty || 0;
    const specRows = [['Мощность', p.power], ['Ёмкость', p.capacity]];
    if(p.weight && p.weight !== '—') specRows.push(['Вес', p.weight]);
    if(p.dims && p.dims !== '—') specRows.push(['Размеры', p.dims]);
    return `<div class="card">
      <div class="thumb">
        
        ${p.img ? `<img src="${p.img}" alt="${p.name}" loading="lazy">` : `<span class="no-photo">фото уточняйте</span>`}
      </div>
      <div class="card-body">
        <h3>${p.name}</h3>
        ${p.sku ? `<div class="sku">${p.sku}</div>` : `<div class="sku">&nbsp;</div>`}
        <div class="specs">
          ${specRows.map(([label,val]) => `<div><div class="spec-label">${label}</div><div class="spec-value">${val}</div></div>`).join('')}
        </div>
        <p class="desc">${p.desc}</p>
        <div class="price-row"><span class="price">${fmt(p.price)} <span class="cur">₽</span></span></div>
        ${q === 0
          ? `<button class="add-btn" onclick="addItem('${key.replace(/'/g,"\\'")}')">В заказ</button>`
          : `<div class="qty">
              <button onclick="changeQty('${key.replace(/'/g,"\\'")}', -1)">−</button>
              <span>${q} шт</span>
              <button onclick="changeQty('${key.replace(/'/g,"\\'")}', 1)">+</button>
            </div>`
        }
      </div>
    </div>`;
  }).join('') || `<div class="empty-cart">Ничего не найдено</div>`;
}

function findProduct(key){ return products.find(p => keyFor(p) === key); }

function addItem(key){
  const p = findProduct(key);
  cart[key] = { product: p, qty: 1 };
  render(); renderCart();
}
function changeQty(key, delta){
  if(!cart[key]) return;
  cart[key].qty += delta;
  if(cart[key].qty <= 0) delete cart[key];
  render(); renderCart();
}
function removeItem(key){ delete cart[key]; render(); renderCart(); }

function renderCart(){
  const items = Object.entries(cart);
  const el = document.getElementById('cartItems');
  document.getElementById('cartCount').textContent = items.reduce((s,[,v]) => s+v.qty, 0);
  const total = items.reduce((s,[,v]) => s + v.qty * v.product.price, 0);
  document.getElementById('cartTotal').textContent = fmt(total) + ' ₽';
  el.innerHTML = items.length ? items.map(([key,v]) => `
    <div class="cart-item">
      <div>
        <div class="name">${v.product.name}</div>
        <div class="sub">${v.qty} × ${fmt(v.product.price)} ₽</div>
      </div>
      <button class="remove" onclick="removeItem('${key}')">убрать</button>
    </div>
  `).join('') : `<div class="empty-cart">Корзина пуста</div>`;
}

function toggleCart(open){
  document.getElementById('cartPanel').classList.toggle('open', open);
  document.getElementById('overlay').classList.toggle('open', open);
}

function orderData(){
  const items = Object.entries(cart);
  const total = items.reduce((s,[,v]) => s + v.qty * v.product.price, 0);
  return { items, total, date: new Date().toLocaleDateString('ru-RU') };
}

function fmtPdf(n){ return n.toLocaleString('ru-RU') + ' ₽'; }

function downloadPDF(){
  if(Object.keys(cart).length === 0){ alert('Корзина пуста'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.addFileToVFS('Roboto-Regular.ttf', ROBOTO_REGULAR_B64);
  doc.addFont('Roboto-Regular.ttf', 'Roboto', 'normal');
  doc.addFileToVFS('Roboto-Bold.ttf', ROBOTO_BOLD_B64);
  doc.addFont('Roboto-Bold.ttf', 'Roboto', 'bold');

  const { items, total, date } = orderData();

  doc.setFont('Roboto', 'bold');
  doc.setFontSize(18);
  doc.text('Заказ Pecron', 14, 20);
  doc.setFontSize(10);
  doc.setFont('Roboto', 'normal');
  doc.text(`Дата: ${date}`, 14, 27);

  let y = 36;
  doc.setDrawColor(230,230,230);
  doc.line(14, y, 196, y);
  y += 8;

  doc.setFont('Roboto', 'bold');
  doc.text('Товар', 14, y);
  doc.text('Кол-во', 130, y);
  doc.text('Сумма', 165, y);
  y += 6;
  doc.setFont('Roboto', 'normal');

  items.forEach(([,v]) => {
    if(y > 275){ doc.addPage(); y = 20; }
    const lines = doc.splitTextToSize(v.product.name, 110);
    doc.text(lines, 14, y);
    doc.text(String(v.qty), 130, y);
    doc.text(fmtPdf(v.qty * v.product.price), 165, y);
    y += lines.length * 5 + 3;
  });

  y += 3;
  doc.setDrawColor(230,230,230);
  doc.line(14, y, 196, y);
  y += 8;
  doc.setFont('Roboto', 'bold');
  doc.setFontSize(13);
  doc.text(`Итого: ${fmtPdf(total)}`, 14, y);

  doc.save(`zakaz-pecron-${Date.now()}.pdf`);
}

renderTabs();
render();
renderCart();
</script>
