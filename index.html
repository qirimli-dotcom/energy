<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pecron — быстрый заказ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#f6f4f1; --fg:#1c1b1a; --fg-soft:#6b6560; --line:#e6e1da;
    --accent:#e8590c; --accent-dark:#b8430a; --card:#ffffff; --danger:#b3261e;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'IBM Plex Sans',sans-serif; background:var(--bg); color:var(--fg); padding-bottom:120px;}
  header{background:var(--fg); color:#fff; padding:18px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:20; border-bottom:3px solid var(--accent);}
  header h1{font-size:18px; font-weight:600; letter-spacing:.2px;}
  header h1 .dot{color:var(--accent);}
  header .sub{font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9a9a9a;}
  .cart-btn{background:var(--accent); color:#fff; border:none; border-radius:6px; padding:9px 14px; font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px;}
  .cart-count{background:#fff; color:var(--accent-dark); border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;}

  .tabs{display:flex; gap:0; border-bottom:1px solid var(--line); background:var(--card); position:sticky; top:57px; z-index:15;}
  .tab{flex:1; text-align:center; padding:13px 8px; font-size:13px; font-weight:600; color:var(--fg-soft); cursor:pointer; border-bottom:2px solid transparent;}
  .tab.active{color:var(--fg); border-bottom-color:var(--accent); border-bottom-width:3px;}

  main{max-width:900px; margin:0 auto; padding:16px;}
  .grid{display:grid; grid-template-columns:1fr; gap:12px;}
  @media(min-width:640px){ .grid{grid-template-columns:1fr 1fr;} }

  .card{background:var(--card); border:1px solid var(--line); border-top:3px solid transparent; border-radius:10px; padding:16px; display:flex; flex-direction:column; gap:8px; box-shadow:0 1px 2px rgba(28,27,26,.04); transition:border-color .15s ease, box-shadow .15s ease;}
  .card:hover{border-top-color:var(--accent); box-shadow:0 4px 14px rgba(28,27,26,.08);}
  .thumb{width:100%; height:140px; border-radius:8px; background:#f0ece6; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:4px;}
  .thumb img{width:100%; height:100%; object-fit:contain; mix-blend-mode:multiply;}
  .thumb .no-photo{font-size:11px; color:#a39c92; font-family:'IBM Plex Mono',monospace;}
  .card h3{font-size:15px; font-weight:600;}
  .card p{font-size:12.5px; color:var(--fg-soft); line-height:1.45; flex:1;}
  .card .sku{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#a39c92;}
  .card .row{display:flex; justify-content:space-between; align-items:center; margin-top:4px;}
  .price{font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:16px; color:var(--accent-dark);}
  .qty{display:flex; align-items:center; border:1px solid var(--line); border-radius:6px; overflow:hidden;}
  .qty button{width:28px; height:28px; border:none; background:#f0ece6; font-size:15px; cursor:pointer;}
  .qty span{width:28px; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:13px;}
  .add-btn{background:var(--accent); color:#fff; border:none; border-radius:6px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; font-family:'IBM Plex Sans',sans-serif;}
  .add-btn:hover{background:var(--accent-dark);}
  .qty button{background:#f0ece6; color:var(--fg);}
  .qty span{color:var(--fg); font-weight:600;}

  .search{width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:14px; margin-bottom:14px; font-family:'IBM Plex Sans',sans-serif; background:var(--card);}

  .cart-panel{position:fixed; top:0; right:-100%; width:100%; max-width:400px; height:100%; background:var(--card); z-index:50; box-shadow:-4px 0 24px rgba(0,0,0,.15); transition:right .25s ease; display:flex; flex-direction:column;}
  .cart-panel.open{right:0;}
  .cart-head{padding:18px 20px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;}
  .cart-head h2{font-size:16px;}
  .close-btn{background:none; border:none; font-size:22px; cursor:pointer; color:var(--fg-soft);}
  .cart-items{flex:1; overflow-y:auto; padding:12px 20px;}
  .cart-item{display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--line); gap:10px;}
  .cart-item .name{font-size:13.5px; font-weight:500;}
  .cart-item .sub{font-size:11.5px; color:var(--fg-soft); font-family:'IBM Plex Mono',monospace;}
  .cart-item .remove{color:var(--danger); background:none; border:none; font-size:12px; cursor:pointer; text-decoration:underline;}
  .cart-foot{padding:16px 20px; border-top:1px solid var(--line);}
  .total-row{display:flex; justify-content:space-between; font-size:16px; font-weight:700; margin-bottom:12px;}
  .total-row span:last-child{color:var(--accent-dark);}
  .search:focus{outline:none; border-color:var(--accent);}
  .order-btn{width:100%; background:var(--accent); color:#fff; border:none; border-radius:8px; padding:13px; font-size:14.5px; font-weight:700; cursor:pointer; margin-bottom:8px;}
  .order-btn:hover{background:var(--accent-dark);}
  .order-btn.pdf{background:#fff; color:var(--fg); border:1.5px solid var(--fg);}
  .order-btn.pdf:hover{background:#f0ece6;}
  .empty-cart{color:var(--fg-soft); font-size:13.5px; text-align:center; padding:40px 0;}
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:40; display:none;}
  .overlay.open{display:block;}
</style>
</head>
<body>

<header>
  <div>
    <h1>Электростанции<span class="dot">.</span></h1>
  </div>
  <button class="cart-btn" onclick="toggleCart(true)">
    Корзина <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<div class="tabs">
  <div class="tab active" data-tab="stations" onclick="switchTab('stations')">Электростанции</div>
  <div class="tab" data-tab="acc" onclick="switchTab('acc')">Аксессуары</div>
</div>

<main>
  <input class="search" id="search" placeholder="Поиск по названию..." oninput="render()">
  <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="overlay" onclick="toggleCart(false)"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-head">
    <h2>Ваш заказ</h2>
    <button class="close-btn" onclick="toggleCart(false)">×</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-foot">
    <div class="total-row"><span>Итого</span><span id="cartTotal">0 ₽</span></div>
    <button class="order-btn pdf" onclick="downloadPDF()">Скачать PDF заказа</button>
  </div>
</div>

let cart = {};
let currentTab = 'stations';

function fmt(n){ return n.toLocaleString('ru-RU') + ' ₽'; }

function currentList(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const list = currentTab === 'stations' ? stations : accessories;
  return q ? list.filter(p => p.name.toLowerCase().includes(q)) : list;
}

function render(){
  const grid = document.getElementById('grid');
  const list = currentList();
  grid.innerHTML = list.map(p => {
    const q = cart[p.sku || p.name]?.qty || 0;
    return `<div class="card">
      <div class="thumb">${p.img ? `<img src="${p.img}" alt="${p.name}" loading="lazy">` : `<span class="no-photo">фото уточняйте</span>`}</div>
      <h3>${p.name}</h3>
      ${p.sku ? `<div class="sku">${p.sku}</div>` : ''}
      <p>${p.desc}</p>
      <div class="row">
        <span class="price">${fmt(p.price)}</span>
        ${q === 0
          ? `<button class="add-btn" onclick="addItem('${escapeKey(p)}')">В заказ</button>`
          : `<div class="qty">
              <button onclick="changeQty('${escapeKey(p)}', -1)">−</button>
              <span>${q}</span>
              <button onclick="changeQty('${escapeKey(p)}', 1)">+</button>
            </div>`
        }
      </div>
    </div>`;
  }).join('') || `<div class="empty-cart">Ничего не найдено</div>`;
}

function escapeKey(p){ return (p.sku || p.name).replace(/'/g, "\\'"); }

function findProduct(key){
  return [...stations, ...accessories].find(p => (p.sku || p.name) === key);
}

function addItem(key){
  const p = findProduct(key);
  cart[key] = { product: p, qty: 1 };
  render(); renderCart();
}

function changeQty(key, delta){
  if(!cart[key]) return;
  cart[key].qty += delta;
  if(cart[key].qty <= 0) delete cart[key];
  render(); renderCart();
}

function removeItem(key){
  delete cart[key];
  render(); renderCart();
}

function renderCart(){
  const items = Object.entries(cart);
  const el = document.getElementById('cartItems');
  document.getElementById('cartCount').textContent = items.reduce((s,[,v]) => s+v.qty, 0);
  const total = items.reduce((s,[,v]) => s + v.qty * v.product.price, 0);
  document.getElementById('cartTotal').textContent = fmt(total);

  el.innerHTML = items.length ? items.map(([key,v]) => `
    <div class="cart-item">
      <div>
        <div class="name">${v.product.name}</div>
        <div class="sub">${v.qty} × ${fmt(v.product.price)}</div>
      </div>
      <button class="remove" onclick="removeItem('${key}')">убрать</button>
    </div>
  `).join('') : `<div class="empty-cart">Корзина пуста</div>`;
}

function toggleCart(open){
  document.getElementById('cartPanel').classList.toggle('open', open);
  document.getElementById('overlay').classList.toggle('open', open);
}

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('search').value = '';
  render();
}

function orderData(){
  const items = Object.entries(cart);
  const total = items.reduce((s,[,v]) => s + v.qty * v.product.price, 0);
  return {
    items,
    total,
    date: new Date().toLocaleDateString('ru-RU')
  };
}

function downloadPDF(){
  if(Object.keys(cart).length === 0){ alert('Корзина пуста'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.addFileToVFS('Roboto-Regular.ttf', ROBOTO_REGULAR_B64);
  doc.addFont('Roboto-Regular.ttf', 'Roboto', 'normal');
  doc.addFileToVFS('Roboto-Bold.ttf', ROBOTO_BOLD_B64);
  doc.addFont('Roboto-Bold.ttf', 'Roboto', 'bold');

  const { items, total, date } = orderData();

  doc.setFont('Roboto', 'bold');
  doc.setFontSize(18);
  doc.text('Заказ Pecron', 14, 20);
  doc.setFontSize(10);
  doc.setFont('Roboto', 'normal');
  doc.text(`Дата: ${date}`, 14, 27);

  let y = 36;
  doc.setDrawColor(230,230,230);
  doc.line(14, y, 196, y);
  y += 8;

  doc.setFont('Roboto', 'bold');
  doc.text('Товар', 14, y);
  doc.text('Кол-во', 130, y);
  doc.text('Сумма', 165, y);
  y += 6;
  doc.setFont('Roboto', 'normal');

  items.forEach(([,v]) => {
    if(y > 275){ doc.addPage(); y = 20; }
    const lines = doc.splitTextToSize(v.product.name, 110);
    doc.text(lines, 14, y);
    doc.text(String(v.qty), 130, y);
    doc.text(fmtPdf(v.qty * v.product.price), 165, y);
    y += lines.length * 5 + 3;
  });

  y += 3;
  doc.setDrawColor(230,230,230);
  doc.line(14, y, 196, y);
  y += 8;
  doc.setFont('Roboto', 'bold');
  doc.setFontSize(13);
  doc.text(`Итого: ${fmtPdf(total)}`, 14, y);

  doc.save(`zakaz-pecron-${Date.now()}.pdf`);
}

function fmtPdf(n){ return n.toLocaleString('ru-RU') + ' ₽'; }

render(); renderCart();
</script>
